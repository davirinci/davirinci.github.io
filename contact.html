<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Various Thingamjigs</title>
    <script>
      const saved = localStorage.getItem("theme");
      if (saved && ["royal", "deep", "dark", "light"].includes(saved)) {
        document.documentElement.setAttribute("data-theme", saved);
      }
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header id="mainHeader">
      <div class="container">
        <h1>Various Thingamjigs</h1>
      </div>
    </header>

    <iframe
      src="/navbar.html"
      id="navbar"
      title="Navigation"
      style="height: 48px"
    ></iframe>

    <main class="container contact-links" aria-label="Contact links">
      <div class="contact-grid">
        <section class="contact-left">
          <h2>Find Me Online</h2>
          <p>Connect with me or explore more of my work.</p>
          <div class="link-buttons">
            <a
              class="link-btn"
              href="https://www.instagram.com/virinci_/"
              target="_blank"
              rel="noopener"
              >Instagram</a
            >
            <a
              class="link-btn"
              href="https://www.youtube.com/@davirinci"
              target="_blank"
              rel="noopener"
              >YouTube</a
            >
            <a class="link-btn" href="mailto:virinci123@gmail.com">Email</a>

            <a
              class="link-btn"
              href="https://www.youtube.com/watch?v=iik25wqIuFo"
              target="_blank"
              rel="noopener"
              >Twitter / X</a
            >
          </div>
        </section>

        <aside class="cta-box contact-cta" aria-label="Custom request">
          <h3>Request a Custom Design</h3>
          <p>
            Have an idea? Send me your brief through the Google Form linked
            below and I’ll get back to you with options.
          </p>
          <a
            class="link-btn primary"
            href="https://docs.google.com/forms/d/e/1FAIpQLSeRf5nthnUJ2X3jYxxkaE0e6BP5TwLE92veYvogGeLCgdCJog/viewform?usp=header"
            target="_blank"
            rel="noopener"
            >Submit a Request</a
          >
        </aside>
      </div>
    </main>

    <iframe
      src="/footer.html"
      id="footer"
      title="Footer"
      style="height: 260px"
    ></iframe>

    <script src="js/disable-contextmenu.js"></script>
    <script src="js/theme.js"></script>
  </body>
</html>
