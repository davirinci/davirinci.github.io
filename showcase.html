<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Showcase - Various Thingamjigs</title>
    <script>
      const saved = localStorage.getItem("theme");
      if (saved && ["royal", "deep", "dark", "light"].includes(saved)) {
        document.documentElement.setAttribute("data-theme", saved);
      }
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header id="mainHeader">
      <div class="container">
        <h1>Various Thingamjigs</h1>
      </div>
    </header>

    <iframe
      src="/navbar.html"
      id="navbar"
      title="Navigation"
      style="height: 48px"
    ></iframe>

    <main class="container" aria-label="Showcase categories">
      <h1>Showcase</h1>
      <section
        class="shop-tiles"
        aria-label="Browse showcase sections"
        id="showcase-tiles"
      >
        <!-- Showcase categories will be dynamically generated -->
      </section>
    </main>

    <iframe
      src="/footer.html"
      id="footer"
      title="Footer"
      style="height: 260px"
    ></iframe>

    <script src="js/disable-contextmenu.js"></script>
    <script src="js/theme.js"></script>
    <script>
      (() => {
        const showcaseTilesContainer =
          document.getElementById("showcase-tiles");
        const categories = [
          { name: "Photography", path: "photography" },
          { name: "Client Projects", path: "client-projects" },
          { name: "Process Experiments", path: "process-experiments" },
        ];

        categories.forEach((category) => {
          const tile = document.createElement("a");
          tile.className = "shop-tile";
          tile.href = `works/${category.path}.html`;

          const label = document.createElement("span");
          label.className = "shop-tile__label";
          label.textContent = category.name;

          tile.appendChild(label);
          showcaseTilesContainer.appendChild(tile);
        });
      })();
    </script>
  </body>
</html>
