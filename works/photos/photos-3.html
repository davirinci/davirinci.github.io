<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos 3 - Various Thingamjigs</title>
    <script>
      const saved = localStorage.getItem("theme");
      if (saved && ["royal", "deep", "dark", "light"].includes(saved)) {
        document.documentElement.setAttribute("data-theme", saved);
      }
    </script>
    <link rel="stylesheet" href="../../css/styles.css" />
  </head>
  <body class="borderless-justified">
    <header id="mainHeader">
      <div class="container">
        <h1>Various Thingamjigs</h1>
      </div>
    </header>

    <iframe
      src="/navbar.html"
      id="navbar"
      title="Navigation"
      style="height: 48px"
    ></iframe>

    <div class="container gallery-container">
      <section id="main">
        <h1>Photos 3</h1>
        <p>
          Blank photography gallery shell. Add images to the matching folder and
          run the build step to populate it.
        </p>
        <div class="portrait-gallery" aria-label="Print thumbnails"></div>
      </section>
    </div>

    <div
      class="lightbox"
      data-active="false"
      aria-hidden="true"
      role="dialog"
      aria-label="Image viewer"
    >
      <button class="lightbox__close" aria-label="Close viewer">×</button>
      <button class="lightbox__nav lightbox__prev" aria-label="Previous image">
        ‹
      </button>
      <button class="lightbox__nav lightbox__next" aria-label="Next image">
        ›
      </button>
      <div class="lightbox__stage">
        <div class="lightbox__carousel">
          <div class="lightbox__slide lightbox__slide--prev-2">
            <img src="" alt="" class="lightbox__carousel-image" />
          </div>
          <div class="lightbox__slide lightbox__slide--prev-1">
            <img src="" alt="" class="lightbox__carousel-image" />
          </div>
          <div class="lightbox__slide lightbox__slide--center">
            <img src="" alt="Current image" class="lightbox__image" />
            <div class="lightbox__controls">
              <button class="lightbox__zoom-out" aria-label="Zoom out">
                −
              </button>
              <button class="lightbox__zoom-reset" aria-label="Reset zoom">
                1x
              </button>
              <button
                class="lightbox__transition"
                aria-label="Toggle transition"
              >
                ➹
              </button>
              <button class="lightbox__slideshow" aria-label="Play slideshow">
                ▶
              </button>
              <button class="lightbox__zoom-in" aria-label="Zoom in">+</button>
            </div>
          </div>
          <div class="lightbox__slide lightbox__slide--next-1">
            <img src="" alt="" class="lightbox__carousel-image" />
          </div>
          <div class="lightbox__slide lightbox__slide--next-2">
            <img src="" alt="" class="lightbox__carousel-image" />
          </div>
        </div>
      </div>
    </div>

    <iframe
      src="/footer.html"
      id="footer"
      title="Footer"
      style="height: 260px"
    ></iframe>

    <script src="../../js/disable-contextmenu.js"></script>
    <script src="../../js/gallery.js"></script>
    <script src="../../js/justified-layout.js"></script>
    <script src="../../js/theme.js"></script>
    <script>
      (function () {
        initializeGallery(".portrait-gallery", { images: [] });
      })();
    </script>
  </body>
</html>
